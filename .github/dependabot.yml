version: 2

updates:
  # JS / pnpm workspace
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - '@next/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'prettier-plugin-tailwindcss'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'playwright'
          - '@playwright/*'
      linting:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'prettier'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'tsx'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  # Docker (compose images)
  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

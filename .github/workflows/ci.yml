name: CI

on:
  push:
    branches: [main]
    # Doc-only changes don't need CI — they don't touch lint/type/build/tests.
    # paths-ignore is OR'd with the watched files: a commit modifying both
    # `*.md` and `*.ts` still runs CI. Saves ~5-10 min/month of Actions
    # quota when the README / SPEC / CLAUDE.md gets a tweak.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.editorconfig'

# Cancel in-flight runs on the same PR/branch when a new commit is pushed.
# Avoids wasted minutes on superseded commits during iterative local→CI
# loops. Pushes to `main` are NOT cancelled (each `main` commit deserves
# its own confirmed green build).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimum default permissions for `GITHUB_TOKEN` (defense-in-depth).
# Each job can request more if needed — but the default in this workflow is
# strict read-only on contents. Without this block, GITHUB_TOKEN inherits
# the repo-wide default which is more permissive (write on contents).
permissions:
  contents: read

env:
  HUSKY: 0
  # Placeholder DB URL used at "prisma generate" + "next build" time only.
  # Real DB never touched in CI for J0. To be reviewed when integration tests
  # arrive (J1) — they'll require a Postgres service container.
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  ci:
    name: Lint, type-check, build
    # Skip drafts: humans iterate on draft PRs without expecting CI green.
    if: ${{ !(github.event.pull_request && github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-scoped permissions — explicit even if same as workflow default,
    # so the next contributor doesn't have to climb up the file to read
    # what this job is allowed to do.
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Don't persist GITHUB_TOKEN in `.git/config` post-step (zizmor
          # artipacked defense — prevents accidental token leak through
          # artifact archives in later steps).
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        # Reads pnpm version from `packageManager` in package.json (single source of truth).

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fxmily/web prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests (Vitest)
        # Vitest config stubs DATABASE_URL/AUTH_SECRET/AUTH_URL via vitest.config.ts
        # so unit tests run without a real Postgres. E2E (Playwright) needs a DB
        # service container — deferred to its own job once the seed helper lands.
        run: pnpm test

      - name: Build
        env:
          # `next build` runs with NODE_ENV=production. Our env validation
          # (apps/web/src/lib/env.ts) requires HTTPS for AUTH_URL in prod AND
          # (S21 boot-assertion) a CRON_SECRET ≥24 chars in prod — so both
          # placeholders must be present for the production-mode build.
          AUTH_SECRET: ci_placeholder_secret_must_be_at_least_32_characters_long
          AUTH_URL: https://ci.fxmily.invalid
          CRON_SECRET: ci_placeholder_cron_secret_at_least_24_chars
          # J10 — Sentry source-map upload runs INSIDE `pnpm build` via the
          # `withSentryConfig` plugin. We only inject the auth token here on
          # `main` pushes (release builds) so PR builds stay free of side
          # effects against the Sentry project.
          SENTRY_AUTH_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: pnpm build

  dependency-audit:
    name: Dependency vulnerability audit
    # Independent of the lint/build job so a freshly-published advisory shows as
    # its OWN red signal — it never masks (nor is masked by) a lint/type/build
    # failure. CodeQL (codeql.yml) covers OUR source; this covers our DEPS.
    if: ${{ !(github.event.pull_request && github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'

      # `pnpm audit` resolves the advisory tree from the committed lockfile and
      # queries the registry — no `pnpm install` / node_modules needed, so this
      # job is fast. `--prod` scopes the GATE to PRODUCTION dependencies only:
      # high/critical vulns in code we actually ship BLOCK the merge, while
      # dev-only toolchain advisories (vitest/vite/undici dev transitive CVEs
      # with no runtime exposure) don't wedge the whole pipeline on something
      # unfixable. `--ignore-registry-errors` keeps a transient npm-registry
      # 5xx from turning into a spurious red build.
      - name: Audit production dependencies (high+ blocks)
        run: pnpm audit --audit-level=high --prod --ignore-registry-errors

      # Full-tree audit (incl. devDependencies) as VISIBILITY only — never
      # blocks. Surfaces dev-only advisories in the log so they're tracked and
      # bumped on the next dependency sweep without gating day-to-day merges.
      - name: Audit full tree (report-only, never blocks)
        if: ${{ always() }}
        run: pnpm audit --audit-level=low --ignore-registry-errors || true

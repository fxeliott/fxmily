name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: 0

jobs:
  ci:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fxmily/web prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Generate Prisma client (pre-build)
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter @fxmily/web prisma:generate

      - name: Build
        env:
          # `next build` runs with NODE_ENV=production. Our env validation
          # (apps/web/src/lib/env.ts) requires HTTPS for AUTH_URL in prod, so
          # the placeholder must use https:// even in CI.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci_placeholder_secret_must_be_at_least_32_characters_long
          AUTH_URL: https://ci.fxmily.invalid
        run: pnpm build

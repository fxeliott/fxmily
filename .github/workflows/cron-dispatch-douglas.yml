name: Cron · dispatch-douglas

# Every 6h UTC (J7).

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          curl -fsS --max-time 600 -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/cron/dispatch-douglas"

name: Cron · dispatch-notifications

# J9 — designed for `*/2 * * * *` UTC on Hetzner, but GitHub Actions has
# a 5 min minimum granularity on scheduled workflows. We compromise on
# every 5 min ; the dispatcher's atomic claim + retry budget absorbs the
# slightly worse latency without missing any push (acceptable trade-off
# for the zero-cost stack).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          curl -fsS --max-time 60 -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/cron/dispatch-notifications"

name: Cron · purge-deleted

# Daily 03:00 UTC (J10 RGPD soft-delete materialise + 30d hard-purge).

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          curl -fsS --max-time 300 -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/cron/purge-deleted"

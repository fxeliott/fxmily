name: Cron Watch

# J10 Phase J — external heartbeat watcher.
#
# Hits `/api/cron/health` every hour and FAILS the run if the endpoint
# returns 503 (at least one cron is stale or never ran). The GitHub
# Actions UI itself acts as the paper trail (failed run + email
# notification to repo admins).
#
# V1.6 fix : the original implementation auto-opened/closed GitHub
# Issues, which broke on this private repo where Issues are disabled
# (`410 Issues has been disabled`). We now exit non-zero from the
# curl step so GH Actions surfaces the alert through its native
# notification channel — simpler, no permissions needed, no API calls.
#
# Tour 12 — SELF-HEALING pass. On a 503, before alerting, the watcher
# re-fires the stale crons itself — but ONLY those that are detection-only
# and idempotent (the 5 overdue-alert nudges + verification-scan: pure
# reads that at worst re-send an admin nudge). Member-facing dispatchers
# (checkin-reminders, dispatch-douglas, weekly-reports,
# dispatch-notifications) are NEVER re-fired out of schedule — a duplicate
# member notification is worse than an hour of red. If the re-check still
# fails, the run fails loudly exactly as before.
#
# Required secrets : `CRON_SECRET` (mirrors `/etc/fxmily/web.env`) and
# `APP_URL` repository variable (e.g. `https://app.fxmilyapp.com`).

on:
  schedule:
    # Every hour at :15. Random offset distributes the load against
    # other on-the-hour workflows in the GitHub Actions free pool.
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watch:
    name: Heartbeat check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Curl health endpoint, self-heal safe crons, fail loud if still red
        run: |
          set +e
          BASE_URL="${{ vars.APP_URL || 'https://app.fxmilyapp.com' }}"

          check_health() {
            BODY=$(curl -sS \
              --max-time 30 \
              -X POST \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              -H "Accept: application/json" \
              -w "\n__HTTP_STATUS__%{http_code}" \
              "$BASE_URL/api/cron/health")
            HTTP_CODE=$(echo "$BODY" | sed -n 's/.*__HTTP_STATUS__\([0-9]*\)$/\1/p')
            BODY_ONLY=$(echo "$BODY" | sed '$d')
          }

          check_health
          echo "::group::Health response (HTTP $HTTP_CODE)"
          echo "$BODY_ONLY"
          echo "::endgroup::"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Heartbeat green"
            exit 0
          fi

          # ---- Self-heal pass (tour 12) --------------------------------------
          # action slug (health report) -> cron route. ONLY detection-only,
          # idempotent routes: pure reads whose worst duplicate effect is a
          # repeated ADMIN nudge. Never member-facing dispatchers.
          declare -A HEALABLE=(
            ["cron.calendar_overdue.scan"]="calendar-overdue-alert"
            ["cron.monthly_debrief_overdue.scan"]="monthly-debrief-overdue-alert"
            ["cron.onboarding_profile_overdue.scan"]="onboarding-profile-overdue-alert"
            ["cron.weekly_report_overdue.scan"]="weekly-report-overdue-alert"
            ["cron.verification_overdue.scan"]="verification-batch-overdue-alert"
            ["cron.verification_scan.scan"]="verification-scan"
            ["cron.admin_daily_brief.scan"]="admin-daily-brief"
          )

          STALE_ACTIONS=$(echo "$BODY_ONLY" | jq -r \
            '.entries[]? | select(.status == "red" or .status == "never_ran") | .action' 2>/dev/null)
          HEALED_ANY=0
          for action in $STALE_ACTIONS; do
            route="${HEALABLE[$action]:-}"
            if [ -z "$route" ]; then
              echo "⏭  $action is stale but NOT self-healable (member-facing or infra) — left for the operator."
              continue
            fi
            echo "🔧 Re-firing $route (stale: $action)..."
            HEAL_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
              --max-time 120 \
              -X POST \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              "$BASE_URL/api/cron/$route")
            echo "   → HTTP $HEAL_CODE"
            [ "$HEAL_CODE" = "200" ] && HEALED_ANY=1
          done

          if [ "$HEALED_ANY" = "1" ]; then
            sleep 10
            check_health
            echo "::group::Health after self-heal (HTTP $HTTP_CODE)"
            echo "$BODY_ONLY"
            echo "::endgroup::"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "::warning title=Cron self-healed::Stale crons were re-fired and the board is green again. If this repeats hourly, the host schedule is broken — check /etc/cron.d/fxmily-app."
              exit 0
            fi
          fi

          echo "::error title=Cron heartbeat alert::HTTP $HTTP_CODE — at least one cron is stale or never ran, and self-heal could not fix it. See body above."
          exit 1

      # Tour 16 — apex probe. Every heartbeat above targets the `app.` subdomain
      # (`APP_URL`), so the tour-12 incident where the bare apex `fxmilyapp.com`
      # went CF 522 was INVISIBLE to this watcher. This step probes the apex
      # directly and asserts it still redirects to the app. It is a SEPARATE step
      # so an apex failure surfaces on its own line and cannot be masked by a
      # green heartbeat. FAIL on 5xx (apex genuinely down); WARN (never fail) on
      # anything that is not a 301/308 → app.fxmilyapp.com (a changed redirect
      # shape is worth a look but not an outage).
      - name: Probe bare apex redirect (fxmilyapp.com)
        run: |
          set +e
          APEX_URL="https://fxmilyapp.com"
          # -sI = silent HEAD; -o headers to parse status + Location. No -L: we
          # want to SEE the redirect itself, not follow it to the app.
          HEADERS=$(curl -sI --max-time 30 "$APEX_URL")
          CURL_RC=$?
          if [ "$CURL_RC" != "0" ]; then
            echo "::warning title=Apex probe inconclusive::curl could not reach $APEX_URL (exit $CURL_RC). DNS/TLS blip or network — not treated as an outage."
            exit 0
          fi
          # First status line (e.g. "HTTP/2 308"); grab the numeric code.
          APEX_CODE=$(echo "$HEADERS" | sed -n 's/^HTTP\/[0-9.]* \([0-9][0-9][0-9]\).*/\1/p' | head -n1)
          # Location header (redirect target), lower-cased key, CR stripped.
          APEX_LOC=$(echo "$HEADERS" | tr -d '\r' | sed -n 's/^[Ll]ocation: *//p' | head -n1)
          echo "::group::Apex response"
          echo "status=$APEX_CODE location=$APEX_LOC"
          echo "$HEADERS"
          echo "::endgroup::"

          case "$APEX_CODE" in
            5??)
              echo "::error title=Apex down::$APEX_URL returned HTTP $APEX_CODE (the bare apex is failing — the tour-12 CF 522 class, invisible to the app.* heartbeats)."
              exit 1
              ;;
            301|308)
              case "$APEX_LOC" in
                https://app.fxmilyapp.com*|http://app.fxmilyapp.com*)
                  echo "✅ Apex redirects to app.fxmilyapp.com (HTTP $APEX_CODE)"
                  exit 0
                  ;;
                *)
                  echo "::warning title=Apex redirect changed::$APEX_URL returned HTTP $APEX_CODE but Location is '$APEX_LOC' (expected app.fxmilyapp.com). Worth a look; not an outage."
                  exit 0
                  ;;
              esac
              ;;
            *)
              echo "::warning title=Apex response unexpected::$APEX_URL returned HTTP '$APEX_CODE' (expected a 301/308 redirect to app.fxmilyapp.com). Not a 5xx, so not failed — but check the apex config."
              exit 0
              ;;
          esac

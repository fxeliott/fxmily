name: Deploy

# J10 — production deploy pipeline.
#
# Trigger : push to `main` (after CI green). Manual dispatch is also wired
# for re-deploying without a fresh commit (re-pull last image).
#
# Pipeline :
#   1. Build the Docker image with the production Dockerfile (multi-stage,
#      Sentry source-map upload runs inside `next build`).
#   2. Push the image to GHCR with tags `latest` + `<sha>`.
#   3. SSH into Hetzner, pull the new image, `compose up -d`, run
#      `prisma migrate deploy`, prune old images.
#
# Secrets required (Settings → Secrets and variables → Actions) :
#   - HETZNER_HOST          : public IPv4 of the Hetzner CX22.
#   - HETZNER_SSH_KEY       : private SSH key matching the `fxmily` user
#                             on the host (ed25519 recommended). Generate
#                             via `ssh-keygen -t ed25519 -f deploy-key`,
#                             then add `deploy-key.pub` to
#                             `/home/fxmily/.ssh/authorized_keys`.
#   - SENTRY_AUTH_TOKEN     : Sentry user/org token with `project:write`
#                             + `project:releases` scopes (used at
#                             build-time for source-map upload).
#   - SENTRY_ORG            : Sentry org slug (e.g. `fxmily`).
#   - SENTRY_PROJECT        : Sentry project slug (e.g. `fxmily-web`).
#
# GHCR auth uses the workflow's automatic `GITHUB_TOKEN` — no manual PAT
# needed. The image is private by default ; if you flip the package
# visibility to public on GHCR, drop the `docker login` step from
# the Hetzner SSH script.

on:
  # J10 Phase O fix B1 : path A/B mutually exclusive. The Hetzner deploy
  # only triggers if `vars.DEPLOY_PATH == 'hetzner'` is set on the repo
  # (Settings → Variables → Actions). Otherwise we fall back to manual
  # `workflow_dispatch`. Without this gate, both deploy.yml and
  # deploy-vercel.yml fired in parallel on every push to main → double
  # `prisma migrate deploy` against two distinct DBs OR one path's
  # secrets missing → permanent CI red.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel a deploy mid-flight — half-deploys are worse than queueing

# Workflow-level permissions are MINIMAL — read-only on contents. The two
# jobs below grant only the additional permissions they actually need at
# the job-level, scoped to their scope. This is the zizmor v1.12 P2 fix
# for excessive-permissions HIGH findings on this workflow.
permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker image
    # J10 Phase O fix B1 : guard against parallel-running deploy-vercel.yml.
    # Set `DEPLOY_PATH=hetzner` on the repo Variables to enable this path,
    # `DEPLOY_PATH=vercel` to enable the Vercel path, or leave unset and
    # use `workflow_dispatch` to run on demand.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_PATH == 'hetzner' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Job-scoped permissions — only this job needs to push to GHCR and use
    # OIDC. `ssh-deploy` and `notify` jobs declare their own minimal blocks.
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # for any future OIDC-based deploy targets (V2)
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Don't leave the GITHUB_TOKEN credential in `.git/config` after
          # the action exits — defense against artifact-uploaded leaks if a
          # later step mistakenly tars the workspace (zizmor artipacked).
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::12}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/fxmily"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ops/docker/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          # Cache Buildx layers in GHA cache to keep iterations under 5 min
          # for source-only changes.
          cache-from: type=gha,scope=fxmily-prod
          cache-to: type=gha,scope=fxmily-prod,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

  ssh-deploy:
    name: SSH deploy on Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # SSH deploy only needs read access to repository contents (none in
    # practice — the appleboy/ssh-action only consumes secrets).
    permissions:
      contents: read
    steps:
      - name: SSH → docker compose pull + up + migrate
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: fxmily
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          # Hard 10-minute timeout protects against a stuck pull /
          # migrate (Caddy retry buffer is 60s ; deploy must clear it).
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/fxmily

            # 1. Auth GHCR using the deploy-keyed token (mounted at
            # `/etc/fxmily/ghcr.token` mode 0600 owner fxmily, populated
            # once during initial provisioning).
            # J10 Phase L review B1 fix : use the workflow's repository_owner
            # so a fork/transfer doesn't break the pull silently.
            cat /etc/fxmily/ghcr.token | docker login ghcr.io \
              -u ${{ github.repository_owner }} --password-stdin

            # 2. Pull the freshly-published image (SHA tag pinned for
            # observability ; `latest` is also updated by the build job).
            export FXMILY_IMAGE=ghcr.io/${{ github.repository_owner }}/fxmily:${{ needs.build-and-push.outputs.image-tag }}
            docker compose -f docker-compose.prod.yml pull web

            # 3. Roll the new image. `--remove-orphans` cleans up if a
            # service was renamed in the compose file.
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans web

            # 3.5. Refresh /opt/fxmily/prisma/ from the newly pulled image.
            # ============================================================
            # CRITICAL BUG FIX 2026-05-14 (post-V1.8 finishing session) :
            # without this step, /opt/fxmily/prisma stays frozen at
            # provisioning time (initial V1.5 launch 2026-05-10) and the
            # migrate container at step 4 reads STALE migration state →
            # `prisma migrate deploy` becomes a silent no-op for any
            # subsequent migration. Bug discovered after V1.8 ship found
            # V1.6 `is_transactional` + V1.8 REFLECT tables had never
            # applied in prod despite 4 deploys reporting "+ migrate"
            # success. See memory fxmily_session_2026-05-14_finishing_progress.md
            # Phase 2 for full root-cause analysis.
            #
            # Mechanism :
            #   1. `docker run --entrypoint /bin/sh $IMAGE -c "tar -C /app/apps/web -cf - prisma"`
            #      writes a tar of the image's `apps/web/prisma/` directory
            #      to stdout (without spawning the Next.js server).
            #   2. Host-side `tar -C /opt/fxmily -xf -` extracts to
            #      `/opt/fxmily/prisma/` (current dir level under /opt/fxmily/).
            #   3. Rewrite `/opt/fxmily/prisma/prisma.config.ts` because
            #      the image-shipped one lives at `apps/web/prisma.config.ts`
            #      (NOT inside `apps/web/prisma/`) and references
            #      `prisma/schema.prisma` relative to apps/web. Our migrate
            #      container at step 4 mounts `/opt/fxmily/prisma` at
            #      `/prisma` so the schema is at root, requiring
            #      `./schema.prisma` relative path.
            echo "Refreshing /opt/fxmily/prisma from new image..."
            docker run --rm --entrypoint /bin/sh "$FXMILY_IMAGE" \
              -c "tar -C /app/apps/web -cf - prisma" \
              | tar -C /opt/fxmily -xf -
            cat > /opt/fxmily/prisma/prisma.config.ts <<'PRISMA_CONFIG_EOF'
            import { defineConfig, env } from 'prisma/config';

            export default defineConfig({
              schema: './schema.prisma',
              migrations: { path: './migrations' },
              datasource: { url: env('DATABASE_URL') },
            });
            PRISMA_CONFIG_EOF
            echo "Prisma sync complete : $(ls /opt/fxmily/prisma/migrations/ | grep -c '^[0-9]') migrations on disk."

            # 4. Apply pending Prisma migrations against prod.
            # `migrate deploy` is non-interactive + non-destructive (refuses
            # to delete data) — safe to run on every deploy.
            #
            # The standalone Next.js runtime image does NOT include the
            # Prisma CLI (only the runtime client). We run a one-shot
            # migration container based on the official `node:22-bookworm-slim`
            # image, which sidesteps having to bake the CLI into the runtime.
            #
            # V1.6 fix : `npx --yes prisma@7` resolves the CLI bin but does
            # NOT install the `prisma/config` sub-export needed by the
            # `prisma.config.ts` defineConfig() at runtime — the CLI then
            # crashes with "Cannot find module 'prisma/config'". The fix is
            # to install the package locally first (which writes a real
            # `node_modules/prisma/config/` tree), then invoke the bin.
            # We `cp -r` the read-only mount into a writable workdir so
            # Prisma can write its temp lockfile without permission errors.
            docker run --rm \
              --network fxmily-internal \
              --env-file /etc/fxmily/web.env \
              -v /opt/fxmily/prisma:/prisma:ro \
              -w /work \
              node:22-bookworm-slim \
              bash -c "
                set -euo pipefail
                cp -r /prisma /work/prisma
                cd /work/prisma
                npm init -y --silent >/dev/null
                npm install --no-save --silent prisma@7
                npx prisma migrate deploy --schema=./schema.prisma
              "

            # 5. Reap dangling images so the 40 GB CX22 disk doesn't fill
            # over time. Keeps the last 3 versions for quick rollback.
            docker image prune -af --filter "label!=keep=true" \
              --filter "until=72h" || true

  notify:
    name: Notify deploy outcome
    needs: [build-and-push, ssh-deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Echo summary
        run: |
          if [ "${{ needs.ssh-deploy.result }}" = "success" ]; then
            echo "✅ Deploy of ${{ needs.build-and-push.outputs.image-tag }} succeeded"
          else
            echo "❌ Deploy failed at SSH step"
            exit 1
          fi

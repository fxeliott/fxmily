name: Provision webhook secret

# Manual maintenance workflow.
#
# The runtime app env lives in /etc/fxmily/web.env ON THE HOST — it is the
# source of truth and is NOT written by deploy.yml (deploy only *reads* it via
# --env-file). So a plain GitHub Actions secret never reaches the running
# container. This workflow bridges that gap: it SSHes into the prod host with
# the SAME credentials deploy.yml uses (HETZNER_HOST + HETZNER_SSH_KEY, user
# `fxmily`), writes RESEND_WEBHOOK_SECRET into web.env, and recreates the `web`
# service so it picks up the value.
#
# Idempotent: any existing RESEND_WEBHOOK_SECRET line is removed before the
# fresh value is appended, so re-running never duplicates it.
#
# Prerequisite: add the repository secret RESEND_WEBHOOK_SECRET
# (Settings -> Secrets and variables -> Actions -> New repository secret).
# The secret value is never printed anywhere in the logs.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: provision-webhook-secret
  cancel-in-progress: false

jobs:
  provision:
    name: Write RESEND_WEBHOOK_SECRET to host web.env and reload web
    runs-on: ubuntu-latest
    steps:
      - name: SSH -> patch web.env + recreate web
        # Map the repo secret into the runner env so ssh-action's `envs:` can
        # forward it to the remote shell. Without this block the forwarded var
        # is undefined and the remote guard exits 1 ("secret is empty").
        env:
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: fxmily
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: RESEND_WEBHOOK_SECRET
          script: |
            set -euo pipefail

            if [ -z "${RESEND_WEBHOOK_SECRET:-}" ]; then
              echo "::error::RESEND_WEBHOOK_SECRET is empty. Add it in Settings -> Secrets and variables -> Actions."
              exit 1
            fi

            ENV_FILE=/etc/fxmily/web.env
            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::$ENV_FILE not found on host."
              exit 1
            fi

            # Use sudo only if the file is not directly writable by `fxmily`.
            if [ -w "$ENV_FILE" ]; then PRIV=""; else PRIV="sudo"; fi

            # Idempotent replace: drop any existing line, then append fresh.
            $PRIV sed -i '/^RESEND_WEBHOOK_SECRET=/d' "$ENV_FILE"
            printf 'RESEND_WEBHOOK_SECRET=%s\n' "$RESEND_WEBHOOK_SECRET" | $PRIV tee -a "$ENV_FILE" > /dev/null

            LINES=$($PRIV grep -c '^RESEND_WEBHOOK_SECRET=' "$ENV_FILE" || true)
            echo "web.env now has ${LINES} RESEND_WEBHOOK_SECRET line(s) (expected 1)."
            if [ "${LINES}" != "1" ]; then
              echo "::error::Expected exactly 1 RESEND_WEBHOOK_SECRET line, found ${LINES}."
              exit 1
            fi

            # Reload the web service so it re-reads web.env (same command family
            # deploy.yml uses; same image, no pull -> just an env refresh).
            cd /opt/fxmily
            docker compose -f docker-compose.prod.yml up -d --force-recreate web

            # Confirm the running container sees a non-empty value.
            # The value itself is never printed.
            docker compose -f docker-compose.prod.yml exec -T web sh -c \
              'test -n "${RESEND_WEBHOOK_SECRET:-}" && echo SECRET_LOADED=yes || { echo SECRET_LOADED=no; exit 1; }'

      - name: Live gate probe (unsigned POST must be 400, not 503)
        run: |
          sleep 6
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H 'content-type: application/json' --data '{}' \
            https://app.fxmilyapp.com/api/webhooks/resend || true)
          echo "Unsigned POST /api/webhooks/resend -> HTTP ${code}"
          if [ "${code}" = "400" ]; then
            echo "OK: secret is loaded (missing_signature_headers path)."
          elif [ "${code}" = "503" ]; then
            echo "::error::Still 503 webhook_disabled -> secret not picked up by the container."
            exit 1
          else
            echo "::warning::Unexpected status ${code} (route reachable, review manually)."
          fi

name: Trigger R2 demo upload (prove J1 app-path live)

# Proves the J1 / ADR-006 dual-write mirror on the LIVE APPLICATION path by
# performing a REAL demo-account avatar upload through the running web
# container: route -> auth() -> sharp -> storage.put() -> DualWriteStorageAdapter
# -> putObjectToR2 -> logAudit('storage.r2_mirror.succeeded'). The read-only
# diagnostic (verify-r2-app-path.yml) proved 0 such audit rows exist yet, so a
# trigger is required.
#
# HOW THE SESSION COOKIE IS MINTED (boundary-clean, no password typed):
# The Next.js standalone runtime does NOT ship @auth/core as resolvable files
# (bundled into webpack chunks), so we cannot import its jwt module in-place.
# Instead we mint the Auth.js v5 session JWE in a THROWAWAY node:22-alpine
# container that shares fxmily-web's network namespace (--network
# container:fxmily-web, so 127.0.0.1:PORT reaches the app) and `npm i jose`.
# We replicate @auth/core@0.41.2's encode EXACTLY (verified from source):
#   enc=A256CBC-HS512, alg=dir, key = HKDF-SHA256(secret, salt=cookieName,
#   info="Auth.js Generated Encryption Key ("+cookieName+")", len=64).
# decode() uses the derived key directly when the JWE has no `kid`, so we omit
# kid. The forged token carries only { sub } -- the Node revocation callback
# re-reads tokenVersion/status/role/timezone from the DB (demo=active,
# tokenVersion=0). AUTH_SECRET is read via `docker exec printenv` and PIPED
# straight into the container's stdin (`read -r`); it is NEVER echoed, NEVER
# printed to CI logs.
#
# mode=probe   (default) READ-ONLY: mint + local decode round-trip, then POST
#              with no cookie (expect 401) and POST cookie + NO file (expect 400
#              missing_file => cookie accepted, ZERO storage mutation). Prints
#              the 4-surface baseline. Mutates nothing.
# mode=execute REAL upload: additionally POST a minimal valid PNG (expect 201),
#              then re-print the 4 surfaces to show the deltas.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'probe (read-only, no upload) OR execute (real demo avatar upload)'
        type: choice
        default: probe
        options:
          - probe
          - execute

permissions: {}

concurrency:
  group: trigger-r2-demo-upload
  cancel-in-progress: false

jobs:
  trigger:
    name: Demo-account avatar trigger
    runs-on: ubuntu-latest
    steps:
      - name: SSH -> mint session cookie + POST avatar
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          MODE: ${{ inputs.mode }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: fxmily
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: MODE
          script: |
            set -euo pipefail
            MODE="${MODE:-probe}"

            echo "===================================================================="
            echo "J1 / R2 APP-PATH TRIGGER  (mode=$MODE)"
            echo "===================================================================="

            PSQL() { docker exec fxmily-postgres psql -U fxmily -d fxmily -tAc "$1"; }
            DEMO_EMAIL='demo@fxmily.local'
            PORT="$(docker exec fxmily-web printenv PORT 2>/dev/null || echo 3000)"
            PORT="${PORT:-3000}"
            echo "app PORT (in-container): $PORT"

            echo
            echo "### 1. Write the mint script to host /tmp (jose, replicates Auth.js encode) ###"
            cat > /tmp/fxmint.mjs <<'MJSEOF'
            import { EncryptJWT, jwtDecrypt } from 'jose';
            import { hkdfSync } from 'node:crypto';

            const DEMO_ID = 'cmrbzsyko0000mopcqwm57umy';
            const COOKIE = '__Secure-authjs.session-token';
            const secret = process.env.AUTH_SECRET;
            const PORT = process.env.FX_PORT || '3000';
            const MODE = process.env.FX_MODE || 'probe';
            const BASE = `http://127.0.0.1:${PORT}`;
            const log = (...a) => console.log('[mint]', ...a);

            if (!secret) { log('FATAL: AUTH_SECRET empty in container'); process.exit(1); }

            // @auth/core@0.41.2 encode(): dir / A256CBC-HS512, HKDF-SHA256 len 64,
            // info = `Auth.js Generated Encryption Key (${salt})`, salt = cookie name.
            const info = `Auth.js Generated Encryption Key (${COOKIE})`;
            const key = new Uint8Array(hkdfSync('sha256', secret, COOKIE, info, 64));

            const now = Math.floor(Date.now() / 1000);
            const jwe = await new EncryptJWT({ sub: DEMO_ID })
              .setProtectedHeader({ alg: 'dir', enc: 'A256CBC-HS512' })
              .setIssuedAt(now)
              .setExpirationTime(now + 60 * 60 * 24 * 30)
              .setJti(crypto.randomUUID())
              .encrypt(key);
            log('minted JWE len', jwe.length, 'prefix', jwe.slice(0, 8) + '...');

            const { payload } = await jwtDecrypt(jwe, key);
            log('local decode round-trip: sub=', payload.sub, 'MATCH=', payload.sub === DEMO_ID);
            if (payload.sub !== DEMO_ID) { log('FATAL: local round-trip mismatch'); process.exit(3); }

            const r1 = await fetch(`${BASE}/api/account/avatar`, { method: 'POST' });
            log('POST no-cookie     ->', r1.status, '(expect 401 unauthorized)');

            const r2 = await fetch(`${BASE}/api/account/avatar`, { method: 'POST', headers: { cookie: `${COOKIE}=${jwe}` } });
            const b2 = await r2.text();
            log('POST cookie+nofile ->', r2.status, b2.slice(0, 160), '(expect 400 missing_file => cookie ACCEPTED)');

            if (MODE !== 'execute') { log('PROBE COMPLETE — no upload, nothing mutated.'); process.exit(0); }

            const png = Buffer.from(
              'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
              'base64',
            );
            const fd = new FormData();
            fd.append('file', new Blob([png], { type: 'image/png' }), 'avatar.png');
            const r3 = await fetch(`${BASE}/api/account/avatar`, { method: 'POST', headers: { cookie: `${COOKIE}=${jwe}` }, body: fd });
            const b3 = await r3.text();
            log('UPLOAD ->', r3.status, b3.slice(0, 300));
            if (r3.status !== 201) { log('FATAL: upload did not return 201'); process.exit(4); }
            log('EXECUTE COMPLETE — demo avatar uploaded through the real app path.');
            MJSEOF

            echo
            echo "### 2. Mint + POST in a throwaway node container (AUTH_SECRET piped, never logged) ###"
            {
              docker exec fxmily-web printenv AUTH_SECRET | docker run --rm -i \
                --network "container:fxmily-web" \
                -e FX_MODE="$MODE" \
                -e FX_PORT="$PORT" \
                -v /tmp/fxmint.mjs:/fxmint.mjs:ro \
                node:22-alpine sh -c '
                  read -r AUTH_SECRET
                  export AUTH_SECRET
                  cd /tmp
                  npm init -y >/tmp/npm.log 2>&1
                  npm install jose@5 --no-audit --no-fund --silent >>/tmp/npm.log 2>&1 || { echo "npm install failed:"; tail -20 /tmp/npm.log; exit 9; }
                  node /fxmint.mjs
                '
            } || echo "(mint container exited non-zero)"
            rm -f /tmp/fxmint.mjs || true

            echo
            echo "===================================================================="
            echo "4-SURFACE VERIFICATION (baseline in probe, deltas in execute)"
            echo "===================================================================="

            echo
            echo "### S1. audit_logs storage.r2_mirror.* (THE governing J1 proof) ###"
            PSQL "SELECT action || ' | ' || count(*) || ' | ' || COALESCE(max(created_at)::text,'-') FROM audit_logs WHERE action LIKE 'storage.r2_mirror%' GROUP BY action ORDER BY action;" || echo "(query failed)"
            MIRROR_OK="$(PSQL "SELECT count(*) FROM audit_logs WHERE action='storage.r2_mirror.succeeded';" | tr -d '[:space:]' || true)"
            echo "storage.r2_mirror.succeeded total: ${MIRROR_OK:-?}"
            echo "-- last 3 r2_mirror rows --"
            PSQL "SELECT action || '  ' || COALESCE(metadata::text,'{}') || '  ' || created_at FROM audit_logs WHERE action LIKE 'storage.r2_mirror%' ORDER BY created_at DESC LIMIT 3;" || true

            echo
            echo "### S2. demo users.avatar_key (null -> set on a real upload) ###"
            PSQL "SELECT 'avatar_key='||COALESCE(avatar_key,'<null>')||' | account.avatar.updated_count='||(SELECT count(*) FROM audit_logs WHERE action='account.avatar.updated') FROM users WHERE email='${DEMO_EMAIL}';" || echo "(query failed)"

            echo
            echo "### S3. R2 object count (independent path, avatars/) ###"
            while IFS= read -r line; do
              case "$line" in
                R2_ACCOUNT_ID=*|R2_ACCESS_KEY_ID=*|R2_SECRET_ACCESS_KEY=*|R2_BUCKET=*) export "$line" ;;
              esac
            done < /etc/fxmily/web.env
            R2_ACCOUNT_ID="${R2_ACCOUNT_ID#http://}"; R2_ACCOUNT_ID="${R2_ACCOUNT_ID#https://}"
            R2_ACCOUNT_ID="${R2_ACCOUNT_ID%%.r2.cloudflarestorage.com*}"; R2_ACCOUNT_ID="${R2_ACCOUNT_ID%%/*}"
            ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
            awsr2() {
              docker run --rm \
                -e AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
                -e AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
                -e AWS_DEFAULT_REGION=auto \
                amazon/aws-cli:latest "$@"
            }
            TOTAL="$(awsr2 s3 ls "s3://$R2_BUCKET" --recursive --endpoint-url "$ENDPOINT" | wc -l | tr -d '[:space:]' || true)"
            AVATARS="$(awsr2 s3 ls "s3://$R2_BUCKET/avatars/" --recursive --endpoint-url "$ENDPOINT" | wc -l | tr -d '[:space:]' || true)"
            echo "R2 objects total: ${TOTAL:-0}   under avatars/: ${AVATARS:-0}"

            echo
            echo "### S4. local uploads volume file count (PRIMARY store) ###"
            VOL="$(docker run --rm -v fxmily-uploads:/data:ro alpine:3 sh -c 'find /data -type f 2>/dev/null | wc -l' | tr -d '[:space:]' || echo '?')"
            echo "uploads volume files: ${VOL:-?}"

            echo
            echo "===================================================================="
            if [ "$MODE" = "execute" ]; then
              if [ "${MIRROR_OK:-0}" != "0" ] && [ -n "${MIRROR_OK:-}" ]; then
                echo "  RESULT: storage.r2_mirror.succeeded now = ${MIRROR_OK}. J1 app-path PROVEN LIVE."
              else
                echo "  RESULT: upload ran but NO r2_mirror.succeeded row -- investigate mirror path."
              fi
            else
              echo "  PROBE done. If cookie was ACCEPTED (400 missing_file above), re-run with mode=execute."
            fi
            echo "===================================================================="

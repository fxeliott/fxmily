name: Verify webhook signed 200

# Comprehensive member-perspective E2E of the Resend webhook route
# (/api/webhooks/resend) against LIVE prod, from an independent HTTP client
# (the GitHub runner is exactly what Resend is: a client that POSTs a
# svix-signed body). It exercises EVERY branch of the route's map:
#
#   [1] unsigned POST          -> 400 missing_signature_headers (gate open, not 503)
#   [2] valid headers, bad sig -> 400 invalid_signature (never 500)
#   [3] GET                     -> 405 method_not_allowed
#   [4] signed no-recipient     -> 200 {received:true} (no DB write)
#   [5] signed transient bounce -> 200 (writes EmailEvent, NO suppression)
#   [6] signed hard bounce      -> 200 (writes EmailEvent + hard_bounce suppression;
#                                       a 200 not 500 PROVES upsertSuppression succeeded,
#                                       else it would propagate to the global catch)
#   [7] replay [6] same svix-id -> 200 {received:true, duplicate:true}
#                                  (HTTP-observable proof [6] persisted: the unique
#                                   svix_id constraint fired P2002 on the second call)
#   [8] signed complaint        -> 200 (writes EmailEvent + complaint suppression)
#
# All DB-writing probes use synthetic RFC 6761 `.invalid` recipients
# (webhook-e2e namespace @e2e.fxmily.invalid) — never a real member, never
# emailed, zero member impact. A final SSH step confirms the synthetic rows
# on the prod DB via the same proven `docker compose exec postgres psql`
# channel, then DELETES them (cleanup, runs `if: always()`).
#
# The secret value is never printed; only the derived signature is used.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: verify-webhook-signed
  cancel-in-progress: false

jobs:
  verify:
    name: Prove every branch of /api/webhooks/resend end-to-end
    runs-on: ubuntu-latest
    steps:
      - name: HTTP probe suite against LIVE prod
        id: probe
        env:
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
        run: |
          python3 - <<'PY'
          import base64, hmac, hashlib, json, os, sys, time, urllib.request, urllib.error

          URL = "https://app.fxmilyapp.com/api/webhooks/resend"
          DOMAIN = "e2e.fxmily.invalid"
          TS = int(time.time())
          TS_STR = str(TS)

          secret = os.environ.get("RESEND_WEBHOOK_SECRET", "")
          if not secret:
              print("::error::RESEND_WEBHOOK_SECRET is empty in the runner env.")
              sys.exit(1)
          key = base64.b64decode(secret.split("_", 1)[1])  # strip whsec_ prefix

          def http(method, headers, body=None):
              data = body.encode() if body is not None else None
              req = urllib.request.Request(
                  URL, data=data, method=method,
                  headers={"content-type": "application/json", **headers},
              )
              try:
                  r = urllib.request.urlopen(req, timeout=20)
                  return r.status, r.read().decode()
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          def signed_headers(svix_id, payload, signing_key):
              content = f"{svix_id}.{TS_STR}.{payload}".encode()
              sig = base64.b64encode(hmac.new(signing_key, content, hashlib.sha256).digest()).decode()
              return {"svix-id": svix_id, "svix-timestamp": TS_STR, "svix-signature": f"v1,{sig}"}

          def post_signed(svix_id, payload, signing_key=key):
              return http("POST", signed_headers(svix_id, payload, signing_key), payload)

          def dumps(obj):
              return json.dumps(obj, separators=(",", ":"))

          failures = []
          def check(label, code, body, expect_code, expect_sub=None):
              ok = code == expect_code and (expect_sub is None or expect_sub in body)
              print(f"[{label}] HTTP {code} {body}  ->  {'OK' if ok else 'FAIL'}")
              if not ok:
                  want = str(expect_code) + (f" +'{expect_sub}'" if expect_sub else "")
                  failures.append(f"{label}: expected {want}, got {code} {body}")

          # [1] Unsigned POST -> 400 missing_signature_headers (gate open, not 503).
          c, b = http("POST", {}, "{}")
          check("1 unsigned->400", c, b, 400, "missing_signature_headers")

          # [2] Valid headers, WRONG signature (signed with a corrupted key) -> 400 invalid_signature.
          payload2 = dumps({"type": "email.delivered", "data": {"to": ["x@y.com"]}})
          c, b = post_signed(f"msg_e2e_badsig_{TS}", payload2, signing_key=key + b"x")
          check("2 badsig->400", c, b, 400, "invalid_signature")

          # [3] GET -> 405 method_not_allowed.
          c, b = http("GET", {})
          check("3 GET->405", c, b, 405, "method_not_allowed")

          # [4] Signed no-recipient event -> 200 {received:true}, no DB write.
          payload4 = dumps({"type": "email.delivered", "data": {}})
          c, b = post_signed(f"msg_e2e_noop_{TS}", payload4)
          check("4 noop->200", c, b, 200, '"received":true')

          # [5] Signed TRANSIENT bounce -> 200, writes EmailEvent, NO suppression.
          email_transient = f"bounce-transient-{TS}@{DOMAIN}"
          payload5 = dumps({"type": "email.bounced", "data": {
              "to": [email_transient], "email_id": f"eid_t_{TS}",
              "bounce": {"type": "Transient", "subType": "General"}}})
          c, b = post_signed(f"msg_e2e_transient_{TS}", payload5)
          check("5 transient->200", c, b, 200, '"received":true')

          # [6] Signed HARD (Permanent) bounce -> 200, writes EmailEvent + hard_bounce
          #     suppression. A 200 (not 500) PROVES upsertSuppression succeeded.
          email_hard = f"bounce-hard-{TS}@{DOMAIN}"
          svix_hard = f"msg_e2e_hard_{TS}"
          payload6 = dumps({"type": "email.bounced", "data": {
              "to": [email_hard], "email_id": f"eid_h_{TS}",
              "bounce": {"type": "Permanent", "subType": "General"}}})
          c, b = post_signed(svix_hard, payload6)
          check("6 hardbounce->200", c, b, 200, '"received":true')

          # [7] Replay [6] byte-identical (same svix-id) -> 200 {received:true,duplicate:true}.
          #     HTTP-observable proof that [6] persisted (unique svix_id -> P2002).
          c, b = post_signed(svix_hard, payload6)
          check("7 replay->duplicate", c, b, 200, '"duplicate":true')

          # [8] Signed COMPLAINT -> 200, writes EmailEvent + complaint suppression.
          email_complaint = f"complaint-{TS}@{DOMAIN}"
          payload8 = dumps({"type": "email.complained", "data": {"to": [email_complaint]}})
          c, b = post_signed(f"msg_e2e_complaint_{TS}", payload8)
          check("8 complaint->200", c, b, 200, '"received":true')

          if failures:
              for f in failures:
                  print(f"::error::{f}")
              sys.exit(1)
          print("OK: all 8 branches proven end-to-end against LIVE prod.")
          PY

      - name: Confirm + clean synthetic rows on prod DB (independent-path proof)
        if: always()
        env:
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: fxmily
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: PROBE_OUTCOME
          script: |
            set -euo pipefail
            cd /opt/fxmily
            DOMAIN='e2e.fxmily.invalid'
            PSQL="docker compose -f docker-compose.prod.yml exec -T postgres psql -U fxmily -d fxmily -tAc"

            echo "== email_events (synthetic) =="
            $PSQL "SELECT event_type, email, COALESCE(bounce_type,'-') FROM email_events WHERE email LIKE '%@${DOMAIN}' ORDER BY email;"
            echo "== email_suppressions (synthetic) =="
            $PSQL "SELECT email, reason, COALESCE(bounce_type,'-') FROM email_suppressions WHERE email LIKE '%@${DOMAIN}' ORDER BY email;"

            EVENTS=$($PSQL "SELECT count(*) FROM email_events WHERE email LIKE '%@${DOMAIN}';")
            SUPP=$($PSQL "SELECT count(*) FROM email_suppressions WHERE email LIKE '%@${DOMAIN}';")
            echo "counts: email_events=${EVENTS} email_suppressions=${SUPP}"

            FAIL=0
            if [ "${PROBE_OUTCOME}" = "success" ]; then
              # [5] transient + [6] hard + [8] complaint = 3 events; [7] replay -> P2002 (no new row).
              [ "${EVENTS}" = "3" ] || { echo "::error::expected 3 synthetic email_events, got ${EVENTS}"; FAIL=1; }
              # hard_bounce + complaint = 2 suppressions; transient -> no suppression.
              [ "${SUPP}" = "2" ]   || { echo "::error::expected 2 synthetic suppressions, got ${SUPP}"; FAIL=1; }
            else
              echo "probe step did not succeed (${PROBE_OUTCOME}); skipping DB-count assertions, cleaning up only."
            fi

            echo "== cleanup =="
            $PSQL "DELETE FROM email_events WHERE email LIKE '%@${DOMAIN}';"
            $PSQL "DELETE FROM email_suppressions WHERE email LIKE '%@${DOMAIN}';"
            echo "synthetic rows removed."

            exit ${FAIL}

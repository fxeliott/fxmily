name: zizmor (Actions security)

# V1.12 P2 — TIER A2 zizmor CI integration (V1.12 P4 — hard-gate enabled).
#
# Static analysis for `.github/workflows/` files. Surfaces findings via
# GitHub Code Scanning (Security tab) by uploading a SARIF report. V1.12 P4
# TIER A1 cleared the 19 `unpinned-uses` HIGH findings (SHA pinning, this
# PR) so the audit step now runs WITHOUT `continue-on-error` — any new
# unpinned ref introduced by a future PR fails the workflow and blocks
# merge. SARIF upload runs `if: always()` so findings still surface even
# on a failed audit.
#
# Trigger philosophy : mirror CodeQL — push to main + PRs to main +
# weekly cron. Path filter scoped to workflow files so unrelated PRs
# don't waste minutes here.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.zizmor.yml'
      - 'zizmor.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.zizmor.yml'
      - 'zizmor.yml'
  schedule:
    # Monday 05:00 UTC (06:00 Europe/Paris) — staggered after CodeQL
    # (04:00 UTC) to spread the Actions quota load. Catches new audits
    # introduced by zizmor upstream releases.
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Workflow-level: minimal read-only. The audit job requests
# `security-events: write` at the job-level for the SARIF upload.
permissions:
  contents: read

jobs:
  audit:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write # upload SARIF to Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install zizmor
        run: pip install zizmor

      - name: Run zizmor → SARIF
        # `--persona=regular` minimises false positives (default).
        # SARIF output goes to Code Scanning; the plain-text dump in the
        # job log is for quick triage.
        run: |
          set -euo pipefail
          zizmor --format sarif .github/workflows/ > zizmor.sarif
          zizmor --format plain .github/workflows/

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

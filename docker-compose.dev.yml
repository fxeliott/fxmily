# Postgres local pour le développement Fxmily.
# Usage : docker compose -f docker-compose.dev.yml up -d
#
# Note : ce fichier est dédié au DEV. La prod tourne via un compose
# distinct sur Hetzner (à venir au Jalon 10), avec Caddy + Next.js.

services:
  postgres:
    image: postgres:17-alpine
    container_name: fxmily-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: fxmily
      POSTGRES_PASSWORD: fxmily_dev
      POSTGRES_DB: fxmily
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Europe/Paris
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fxmily -d fxmily']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: fxmily_postgres_data_dev

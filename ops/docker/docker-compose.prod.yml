# J10 — Fxmily production stack on Hetzner CX22 (Falkenstein UE).
#
# Stack :
#   - postgres   : Postgres 17 alpine, 1.5 GB allocated, single instance.
#   - web        : Next.js 16 standalone runtime (image built from
#                  ops/docker/Dockerfile.prod by the GitHub Actions deploy).
#   - caddy      : reverse proxy + Let's Encrypt certs + HSTS preload.
#
# Crons run on the HOST via systemd timers / `/etc/cron.d/fxmily-app`,
# which curl into `web` on port 3000 with the shared `CRON_SECRET`. We
# do NOT run cron in a container — keeps the cron daemon's `--max-time`
# observable through `journalctl -u cron` and decoupled from app restarts.
#
# Secrets policy :
#   - `/etc/fxmily/postgres_password`  : 0600 root-owned, mounted via
#     Docker secrets.
#   - `/etc/fxmily/web.env`            : 0600 fxmily-owned, mounted via
#     `env_file` (full env shape ; the `web` service reads it on boot).
#   - `/etc/fxmily/cron.env`           : 0600 fxmily-owned, sourced by the
#     `fxmily-cron` host wrapper script (NOT by Docker — never in image).
#
# First-time provisioning steps live in `docs/runbook-hetzner-deploy.md`.

services:
  postgres:
    image: postgres:17-alpine
    container_name: fxmily-postgres
    restart: unless-stopped
    # Bound container log growth so a chatty/looping process can't silently fill
    # the CX22 disk (a full disk = Postgres stops + backups fail at the worst
    # moment). ~50 MB ceiling/container. The host-wide default is also set in
    # setup-host.sh (/etc/docker/daemon.json) for any future container.
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    # `pg_isready` healthcheck shadows the real "can app connect" answer.
    # We accept this because the alternative (psql -c) requires shell+
    # auth dance that adds attack surface to a HEALTHCHECK script.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fxmily -d fxmily']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: fxmily
      POSTGRES_DB: fxmily
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Locale matters for ORDER BY + ILIKE accent-insensitive lookups.
      LANG: C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/fxmily/backups:/backups
    secrets:
      - postgres_password
    # Keep Postgres internal — only `web` reaches it via the compose
    # network. No host port published (no 5432 leak).
    networks:
      - internal
    # Resource caps for the CX22 (2 vCPU, 4 GB RAM) — Postgres gets ~1.5 GB
    # max so OOM protection still leaves Caddy + Next.js room.
    deploy:
      resources:
        limits:
          memory: 1500m

  web:
    image: ${FXMILY_IMAGE:-ghcr.io/fxeliott/fxmily:latest}
    container_name: fxmily-web
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    # `env_file` reads `/etc/fxmily/web.env` (host-mounted secrets file).
    env_file:
      - /etc/fxmily/web.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    # S10 hardening (TIER1 data-loss fix) — member uploads (trade screenshots,
    # MT5 proofs = the S3 anti-lie evidence, training shots, annotations) are
    # written by LocalStorageAdapter to `<cwd>/.uploads` = `/app/.uploads`
    # (apps/web/src/lib/storage/local.ts:44). Without a persistent volume that
    # path lives in the container's EPHEMERAL writable layer and is WIPED on
    # every `docker compose up -d web` (i.e. every deploy) → the uploaded image
    # binaries vanish while their DB rows survive → 404 on read. A Docker-managed
    # named volume keeps the proofs across container recreation. (Long-term: the
    # R2 adapter in apps/web/src/lib/storage/r2.ts replaces this once implemented.)
    #
    # Tour 14 (data-loss follow-up) — the SAME named volume is ALSO mounted at
    # `/opt/fxmily/.uploads`. The app resolves its upload root from
    # `process.env.UPLOADS_DIR` FIRST (apps/web/src/lib/storage/local.ts:44), and
    # web.env historically set `UPLOADS_DIR=/opt/fxmily/.uploads` — a path that,
    # WITHOUT this second mount, lived in the container's ephemeral overlay layer
    # (wiped on every deploy).
    #
    # ⚠ CAVEAT (2026-07-08, runtime-proven): this file is NOT synced to the host
    # by deploy.yml (only ops/cron + ops/scripts are scp'd), so the second mount
    # below may be ABSENT on prod. The entrypoint (ops/docker/docker-entrypoint.sh)
    # is the layer that actually guarantees durability: it pins an unset/blank
    # UPLOADS_DIR to `/app/.uploads` and symlink-routes any unmounted UPLOADS_DIR
    # into the volume. An UNSET UPLOADS_DIR without that entrypoint default would
    # land at `<cwd>/.uploads` = `/app/apps/web/.uploads` (Next standalone chdirs
    # to apps/web) — outside BOTH mounts = silent data-loss. Removing UPLOADS_DIR
    # from web.env (operator action) is therefore safe ONLY once an image with the
    # entrypoint default is deployed.
    volumes:
      - fxmily-uploads:/app/.uploads
      - fxmily-uploads:/opt/fxmily/.uploads
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1024m
    # Container's own healthcheck (Dockerfile HEALTHCHECK) drives Caddy's
    # `lb_try_duration` retry behaviour. No additional override needed.

  caddy:
    image: caddy:2-alpine
    container_name: fxmily-caddy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - /etc/fxmily/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/fxmily/caddy:/var/log/caddy
    depends_on:
      - web
    networks:
      - internal

volumes:
  postgres_data:
    name: fxmily-postgres-data
  caddy_data:
    name: fxmily-caddy-data
  caddy_config:
    name: fxmily-caddy-config
  # S10 — persists member uploads (/app/.uploads) across `web` recreation.
  fxmily-uploads:
    name: fxmily-uploads

networks:
  internal:
    name: fxmily-internal
    driver: bridge
    # Pin a private RFC1918 subnet outside Docker default pool 172.16/12.
    # Hetzner host already has Ichor (n8n + langfuse) using 172.17/172.19/172.20
    # from the default pool — without this, Docker errors with "all predefined
    # address pools have been fully subnetted" when creating fxmily-internal.
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24

secrets:
  postgres_password:
    file: /etc/fxmily/postgres_password
